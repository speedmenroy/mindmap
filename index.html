<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的筆記</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --indigo: #6366f1; --indigo-d: #4f46e5;
    --emerald: #10b981; --emerald-d: #059669;
    --slate50:#f8fafc; --slate100:#f1f5f9; --slate200:#e2e8f0;
    --slate300:#cbd5e1; --slate400:#94a3b8; --slate800:#1e293b;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang HK", "Microsoft JhengHei", sans-serif;
    height: 100vh; overflow: hidden; color: var(--slate800); background: var(--slate50);
  }
  .app { display: flex; height: 100vh; }

  /* Sidebar */
  .sidebar {
    width: 288px; background: #fff; border-right: 1px solid var(--slate200);
    display: flex; flex-direction: column; transition: width .3s, min-width .3s; overflow: hidden;
  }
  .sidebar.collapsed { width: 0; min-width: 0; }
  .side-head { padding: 16px; border-bottom: 1px solid var(--slate200); }
  .side-title { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .side-title svg { color: var(--indigo); }
  .new-btns { display: flex; gap: 8px; }
  .new-btns button {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 4px;
    padding: 8px; border: none; border-radius: 8px; color: #fff; font-size: 14px;
    cursor: pointer; transition: background .2s;
  }
  .btn-note { background: var(--indigo); }
  .btn-note:hover { background: var(--indigo-d); }
  .btn-map { background: var(--emerald); }
  .btn-map:hover { background: var(--emerald-d); }

  .search-wrap { padding: 12px; border-bottom: 1px solid var(--slate100); position: relative; }
  .search-wrap svg { position: absolute; left: 22px; top: 21px; color: var(--slate400); }
  .search-wrap input {
    width: 100%; padding: 8px 12px 8px 34px; font-size: 14px; border-radius: 8px;
    background: var(--slate100); border: 1px solid transparent; outline: none;
  }
  .search-wrap input:focus { background: #fff; border-color: #c7d2fe; }

  .list { flex: 1; overflow-y: auto; }
  .empty-list { text-align: center; font-size: 14px; color: var(--slate400); margin-top: 32px; padding: 0 16px; }
  .item {
    padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #f8fafc;
    border-left: 4px solid transparent; display: flex; justify-content: space-between; gap: 8px;
  }
  .item:hover { background: var(--slate50); }
  .item.active { background: #eef2ff; border-left-color: var(--indigo); }
  .item-main { min-width: 0; flex: 1; }
  .item-title { font-weight: 500; font-size: 14px; display: flex; align-items: center; gap: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-title svg { flex-shrink: 0; }
  .item-preview { font-size: 12px; color: var(--slate400); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .item-date { font-size: 12px; color: var(--slate300); margin-top: 4px; }
  .del-btn { opacity: 0; border: none; background: none; cursor: pointer; color: var(--slate400); padding: 4px; }
  .item:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: #ef4444; }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .topbar { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--slate200); background: #fff; }
  .icon-btn { padding: 8px; border: none; background: none; border-radius: 8px; cursor: pointer; color: #475569; display: flex; }
  .icon-btn:hover { background: var(--slate100); }
  .title-input { flex: 1; font-size: 18px; font-weight: 600; border: none; outline: none; background: transparent; }
  .save-btn {
    display: flex; align-items: center; gap: 8px; padding: 8px 16px; border: none;
    border-radius: 8px; background: var(--indigo); color: #fff; font-size: 14px; font-weight: 500; cursor: pointer;
  }
  .save-btn:hover { background: var(--indigo-d); }

  .empty-main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--slate400); }
  .empty-main svg { opacity: .3; margin-bottom: 16px; }

  .note-editor { flex: 1; display: flex; padding: 24px 48px; overflow: hidden; }
  .note-editor textarea {
    flex: 1; width: 100%; resize: none; border: none; outline: none; background: transparent;
    font-size: 16px; line-height: 1.7; font-family: inherit;
  }

  /* Mindmap */
  .map-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--slate100); }
  .map-hint { padding: 8px 16px; font-size: 12px; color: #64748b; background: #fff; border-bottom: 1px solid var(--slate200); }
  .canvas-scroll { position: relative; flex: 1; overflow: auto; }
  .canvas { position: relative; width: 2000px; height: 1400px; }
  .canvas svg { position: absolute; top: 0; left: 0; pointer-events: none; }
  .node {
    position: absolute; transform: translate(-50%, -50%); border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,.12); border: 2px solid var(--slate300);
    background: #fff; cursor: grab; user-select: none; max-width: 220px;
  }
  .node:active { cursor: grabbing; }
  .node.root { background: var(--emerald); border-color: var(--emerald-d); color: #fff; }
  .node-inner { padding: 8px 16px; }
  .node-inner span { font-size: 14px; font-weight: 500; white-space: nowrap; }
  .node-inner input { border: none; outline: none; background: transparent; font-size: 14px; width: 120px; color: inherit; font-family: inherit; }
  .node-btns { position: absolute; right: -8px; top: -8px; display: flex; gap: 4px; opacity: 0; transition: opacity .2s; }
  .node:hover .node-btns { opacity: 1; }
  .node-btns button {
    width: 24px; height: 24px; border-radius: 50%; border: none; color: #fff;
    display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.2);
  }
  .add-btn { background: var(--indigo); } .add-btn:hover { background: var(--indigo-d); }
  .rm-btn { background: #ef4444; } .rm-btn:hover { background: #dc2626; }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="side-head">
      <div class="side-title">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
        我的筆記
      </div>
      <div class="new-btns">
        <button class="btn-note" onclick="createNote('note')">＋ 筆記</button>
        <button class="btn-map" onclick="createNote('mindmap')">＋ 心智圖</button>
      </div>
    </div>
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" placeholder="搜尋…" oninput="renderList()">
    </div>
    <div class="list" id="list"></div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <button class="icon-btn" onclick="toggleSidebar()" id="toggleBtn" title="收埋/展開側欄">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>
      </button>
      <input class="title-input hidden" id="titleInput" placeholder="標題…" oninput="onTitleChange()">
      <button class="save-btn hidden" id="saveBtn" onclick="saveNote()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
        <span id="saveLabel">儲存</span>
      </button>
    </div>

    <div class="empty-main" id="emptyMain">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
      <p>撳左邊按鈕新增筆記或心智圖</p>
    </div>

    <div class="note-editor hidden" id="noteEditor">
      <textarea id="noteBody" placeholder="喺度開始打字…" oninput="onBodyChange()"></textarea>
    </div>

    <div class="map-wrap hidden" id="mapWrap">
      <div class="map-hint">提示：撳節點右上角藍掣加子節點 · 拖曳移動 · 雙擊改字 · 紅掣刪除</div>
      <div class="canvas-scroll" id="canvasScroll">
        <div class="canvas" id="canvas">
          <svg id="lines" width="2000" height="1400"></svg>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
let notes = [];
let activeId = null;

// ---- 儲存 ----
function load() {
  try {
    const raw = localStorage.getItem('my-notes-html');
    if (raw) {
      notes = JSON.parse(raw);
      if (notes.length) activeId = notes[0].id;
    }
  } catch(e){}
}
function persist() {
  try { localStorage.setItem('my-notes-html', JSON.stringify(notes)); } catch(e){}
}

function getActive() { return notes.find(n => n.id === activeId); }

function createNote(type) {
  const base = { id: Date.now(), type, title: '', updatedAt: Date.now() };
  let n;
  if (type === 'mindmap') {
    n = { ...base, nodes: [{ id: 'root', parentId: null, text: '中心主題', x: 400, y: 300 }] };
  } else {
    n = { ...base, body: '' };
  }
  notes.unshift(n);
  activeId = n.id;
  persist(); renderAll();
}

function deleteNote(id, e) {
  e.stopPropagation();
  notes = notes.filter(n => n.id !== id);
  if (activeId === id) activeId = notes.length ? notes[0].id : null;
  persist(); renderAll();
}

function selectNote(id) { activeId = id; renderAll(); }

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }

function formatDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('zh-HK',{month:'short',day:'numeric'}) + ' ' +
         d.toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit'});
}

const noteIcon = '<svg width="14" height="14" fill="none" stroke="#818cf8" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>';
const mapIcon = '<svg width="14" height="14" fill="none" stroke="#10b981" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="5" r="3"/><circle cx="5" cy="19" r="3"/><circle cx="19" cy="19" r="3"/><path d="M12 8v3m0 0-5 5m5-5 5 5"/></svg>';

function renderList() {
  const q = document.getElementById('search').value.toLowerCase();
  const listEl = document.getElementById('list');
  const filtered = notes.filter(n => {
    const inTitle = (n.title||'').toLowerCase().includes(q);
    const inBody = (n.body||'').toLowerCase().includes(q);
    const inNodes = (n.nodes||[]).some(nd => (nd.text||'').toLowerCase().includes(q));
    return inTitle || inBody || inNodes;
  });
  if (!filtered.length) {
    listEl.innerHTML = '<p class="empty-list">未有記錄，撳上面按鈕新增</p>';
    return;
  }
  listEl.innerHTML = filtered.map(n => {
    const icon = n.type === 'mindmap' ? mapIcon : noteIcon;
    const defTitle = n.type === 'mindmap' ? '未命名心智圖' : '未命名筆記';
    const preview = n.type === 'mindmap'
      ? `${(n.nodes||[]).length} 個節點`
      : (n.body ? n.body.slice(0,40) : '無內容');
    return `<div class="item ${n.id===activeId?'active':''}" onclick="selectNote(${n.id})">
      <div class="item-main">
        <div class="item-title">${icon}${escapeHtml(n.title || defTitle)}</div>
        <div class="item-preview">${escapeHtml(preview)}</div>
        <div class="item-date">${formatDate(n.updatedAt)}</div>
      </div>
      <button class="del-btn" onclick="deleteNote(${n.id}, event)">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
    </div>`;
  }).join('');
}

function escapeHtml(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function renderMain() {
  const n = getActive();
  const emptyMain = document.getElementById('emptyMain');
  const noteEditor = document.getElementById('noteEditor');
  const mapWrap = document.getElementById('mapWrap');
  const titleInput = document.getElementById('titleInput');
  const saveBtn = document.getElementById('saveBtn');

  if (!n) {
    emptyMain.classList.remove('hidden');
    noteEditor.classList.add('hidden');
    mapWrap.classList.add('hidden');
    titleInput.classList.add('hidden');
    saveBtn.classList.add('hidden');
    return;
  }
  emptyMain.classList.add('hidden');
  titleInput.classList.remove('hidden');
  saveBtn.classList.remove('hidden');
  titleInput.value = n.title || '';
  titleInput.placeholder = n.type === 'mindmap' ? '心智圖標題…' : '筆記標題…';

  if (n.type === 'note') {
    noteEditor.classList.remove('hidden');
    mapWrap.classList.add('hidden');
    document.getElementById('noteBody').value = n.body || '';
  } else {
    noteEditor.classList.add('hidden');
    mapWrap.classList.remove('hidden');
    renderMap();
  }
}

function renderAll() { renderList(); renderMain(); }

function onTitleChange() {
  const n = getActive(); if(!n) return;
  n.title = document.getElementById('titleInput').value;
  n.updatedAt = Date.now();
  persist(); renderList();
}
function onBodyChange() {
  const n = getActive(); if(!n) return;
  n.body = document.getElementById('noteBody').value;
  n.updatedAt = Date.now();
  persist(); renderList();
}
function saveNote() {
  const label = document.getElementById('saveLabel');
  label.textContent = '已儲存 ✓';
  setTimeout(()=> label.textContent = '儲存', 1500);
}

/* ---------- 心智圖 ---------- */
let editingNodeId = null;
let drag = null;

function renderMap() {
  const n = getActive(); if(!n || n.type!=='mindmap') return;
  const canvas = document.getElementById('canvas');
  const lines = document.getElementById('lines');

  // 連線
  let lineHtml = '';
  n.nodes.forEach(nd => {
    if (!nd.parentId) return;
    const p = n.nodes.find(x => x.id === nd.parentId);
    if (!p) return;
    lineHtml += `<line x1="${p.x}" y1="${p.y}" x2="${nd.x}" y2="${nd.y}" stroke="#94a3b8" stroke-width="2"/>`;
  });
  lines.innerHTML = lineHtml;

  // 移除舊節點
  canvas.querySelectorAll('.node').forEach(el => el.remove());

  n.nodes.forEach(nd => {
    const isRoot = nd.id === 'root';
    const el = document.createElement('div');
    el.className = 'node' + (isRoot ? ' root' : '');
    el.style.left = nd.x + 'px';
    el.style.top = nd.y + 'px';
    el.dataset.id = nd.id;

    const inner = document.createElement('div');
    inner.className = 'node-inner';
    if (editingNodeId === nd.id) {
      const inp = document.createElement('input');
      inp.value = nd.text;
      inp.oninput = () => { nd.text = inp.value; n.updatedAt = Date.now(); persist(); };
      inp.onblur = () => { editingNodeId = null; renderMap(); renderList(); };
      inp.onkeydown = (e) => { if(e.key==='Enter'){ editingNodeId=null; renderMap(); renderList(); } };
      inp.onpointerdown = e => e.stopPropagation();
      inner.appendChild(inp);
      setTimeout(()=>inp.focus(),0);
    } else {
      const span = document.createElement('span');
      span.textContent = nd.text || '（空白）';
      inner.appendChild(span);
    }
    el.appendChild(inner);

    // 按鈕
    const btns = document.createElement('div');
    btns.className = 'node-btns';
    const addB = document.createElement('button');
    addB.className = 'add-btn'; addB.title='加子節點';
    addB.innerHTML = '<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>';
    addB.onpointerdown = e => e.stopPropagation();
    addB.onclick = () => addChild(nd.id);
    btns.appendChild(addB);
    if (!isRoot) {
      const rmB = document.createElement('button');
      rmB.className = 'rm-btn'; rmB.title='刪除';
      rmB.innerHTML = '<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>';
      rmB.onpointerdown = e => e.stopPropagation();
      rmB.onclick = () => deleteMapNode(nd.id);
      btns.appendChild(rmB);
    }
    el.appendChild(btns);

    // 拖曳
    el.onpointerdown = (e) => {
      if (editingNodeId === nd.id) return;
      const rect = document.getElementById('canvasScroll').getBoundingClientRect();
      const scroll = document.getElementById('canvasScroll');
      drag = {
        id: nd.id,
        offsetX: e.clientX - rect.left + scroll.scrollLeft - nd.x,
        offsetY: e.clientY - rect.top + scroll.scrollTop - nd.y,
      };
    };
    el.ondblclick = () => { editingNodeId = nd.id; renderMap(); };

    canvas.appendChild(el);
  });
}

function addChild(parentId) {
  const n = getActive();
  const p = n.nodes.find(x => x.id === parentId);
  const newNode = {
    id: 'n' + Date.now(),
    parentId,
    text: '新節點',
    x: p.x + 170,
    y: p.y + (Math.random()*120 - 60),
  };
  n.nodes.push(newNode);
  n.updatedAt = Date.now();
  editingNodeId = newNode.id;
  persist(); renderMap(); renderList();
}

function deleteMapNode(id) {
  const n = getActive();
  const toDelete = new Set([id]);
  let changed = true;
  while (changed) {
    changed = false;
    n.nodes.forEach(nd => {
      if (nd.parentId && toDelete.has(nd.parentId) && !toDelete.has(nd.id)) {
        toDelete.add(nd.id); changed = true;
      }
    });
  }
  n.nodes = n.nodes.filter(nd => !toDelete.has(nd.id));
  n.updatedAt = Date.now();
  persist(); renderMap(); renderList();
}

document.addEventListener('pointermove', (e) => {
  if (!drag) return;
  const n = getActive(); if(!n) return;
  const scroll = document.getElementById('canvasScroll');
  const rect = scroll.getBoundingClientRect();
  const nd = n.nodes.find(x => x.id === drag.id);
  nd.x = e.clientX - rect.left + scroll.scrollLeft - drag.offsetX;
  nd.y = e.clientY - rect.top + scroll.scrollTop - drag.offsetY;
  n.updatedAt = Date.now();
  // 只更新位置，避免重繪成本
  const el = document.querySelector('.node[data-id="'+drag.id+'"]');
  if (el) { el.style.left = nd.x+'px'; el.style.top = nd.y+'px'; }
  // 更新連線
  const lines = document.getElementById('lines');
  let lineHtml = '';
  n.nodes.forEach(x => {
    if (!x.parentId) return;
    const p = n.nodes.find(y => y.id === x.parentId);
    if (!p) return;
    lineHtml += `<line x1="${p.x}" y1="${p.y}" x2="${x.x}" y2="${x.y}" stroke="#94a3b8" stroke-width="2"/>`;
  });
  lines.innerHTML = lineHtml;
});
document.addEventListener('pointerup', () => {
  if (drag) { persist(); drag = null; }
});

// 初始化
load();
renderAll();
</script>
</body>
</html>
